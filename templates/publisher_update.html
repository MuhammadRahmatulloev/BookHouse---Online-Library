{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Publisher - BookHouse{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Edit Publisher</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label for="name">Publisher Name:</label>
            <input type="text" id="name" name="name" value="{{ publisher.name }}" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" value="{{ publisher.address }}" required>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" value="{{ publisher.phone }}" required>

            <label for="logo">New Logo (optional):</label>
            <input type="file" id="logo" name="logo" accept="image/*">
            
            {% if publisher.logo %}
                <p>Current logo: <img src="{{ publisher.logo.url }}" width="150" alt="logo"></p>
            {% endif %}

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'publisher_detail' pk=publisher.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
