{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Category - BookHouse{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/category_update.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Edit Category</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <label for="name">Category Name:</label>
            <input type="text" id="name" name="name" value="{{ category.name }}" required>

            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5">{{ category.description }}</textarea>
            
            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'category_detail' pk=category.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
