{% extends 'base.html' %}
{% load static %}

{% block title %}Add New Publisher - BookHouse{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Add New Publisher</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Create Publisher</button>
                <a href="{% url 'publisher_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
