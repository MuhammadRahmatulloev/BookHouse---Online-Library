{% extends 'base.html' %}
{% load static %}

{% block title %}Add New Publisher - BookHouse{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/publisher_create.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Add New Publisher</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label for="name">Publisher Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" required>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" required>

            <label for="logo">Logo:</label>
            <input type="file" id="logo" name="logo" accept="image/*">

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">Create Publisher</button>
                <a href="{% url 'publisher_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
